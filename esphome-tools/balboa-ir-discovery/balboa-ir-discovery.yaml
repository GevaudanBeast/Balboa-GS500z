###############################################################################
# Balboa GS500Z - Outil de Découverte de Commandes IR
###############################################################################
# Cet outil permet de découvrir les codes IR acceptés par votre spa Balboa.
# Il teste systématiquement différents protocoles et codes IR, avec validation
# humaine simple via l'interface Home Assistant.
#
# Version: 1.0.0
# Auteur: Claude AI
# License: MIT
###############################################################################

substitutions:
  # Configuration de base - PERSONNALISEZ CES VALEURS
  device_name: "balboa-ir-discovery"
  friendly_name: "Balboa IR Discovery"

  # GPIO Pins - Adaptez selon votre ESP32
  ir_transmitter_pin: "GPIO4"    # Pin de l'émetteur IR
  ir_receiver_pin: "GPIO5"       # Pin du récepteur IR (optionnel)
  rs485_tx_pin: "GPIO17"         # Pin TX RS-485 (optionnel, pour validation auto)
  rs485_rx_pin: "GPIO16"         # Pin RX RS-485 (optionnel, pour validation auto)

  # Configuration Wi-Fi
  wifi_ssid: !secret wifi_ssid
  wifi_password: !secret wifi_password

  # Configuration de découverte
  discovery_delay: "2s"          # Délai entre chaque test de code
  protocol_current: "NEC"        # Protocole en cours de test

###############################################################################
# Configuration ESPHome de base
###############################################################################

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  comment: "Outil de découverte des codes IR pour spa Balboa GS500Z"

  # Script exécuté au démarrage
  on_boot:
    priority: -100
    then:
      - logger.log:
          format: "=========================================="
          level: INFO
      - logger.log:
          format: "Balboa IR Discovery Tool - Démarrage"
          level: INFO
      - logger.log:
          format: "=========================================="
          level: INFO
      - delay: 2s
      - lambda: |-
          id(discovery_status).publish_state("Prêt - Appuyez sur 'Démarrer'");

esp32:
  board: esp32dev
  framework:
    type: arduino

# Configuration Wi-Fi
wifi:
  ssid: ${wifi_ssid}
  password: ${wifi_password}

  # Point d'accès de secours en cas de problème de connexion
  ap:
    ssid: "${friendly_name} Fallback"
    password: "balboa123456"

# Active l'API Home Assistant
api:
  encryption:
    key: !secret api_encryption_key

# Active OTA (mise à jour sans fil)
ota:
  - platform: esphome
    password: !secret ota_password

# Active le serveur web (interface locale)
web_server:
  port: 80

# Active les logs
logger:
  level: INFO
  logs:
    remote_transmitter: DEBUG

# Active le captive portal (pour configuration WiFi facile)
captive_portal:

###############################################################################
# Composants IR - Émetteur et Récepteur
###############################################################################

# Émetteur IR - Envoie les codes de test
remote_transmitter:
  pin: ${ir_transmitter_pin}
  carrier_duty_percent: 50%

# Récepteur IR - Capture les codes IR existants (optionnel mais utile)
remote_receiver:
  pin:
    number: ${ir_receiver_pin}
    inverted: true
    mode:
      input: true
      pullup: true
  dump: all  # Affiche tous les codes reçus dans les logs
  tolerance: 25%

  # Quand un code IR est reçu, on l'affiche
  on_nec:
    then:
      - logger.log:
          format: "📡 Code NEC capturé: 0x%08X"
          args: [ 'x.address << 16 | x.command' ]
          level: INFO

  on_rc_switch:
    then:
      - logger.log:
          format: "📡 Code RC_SWITCH capturé: 0x%08X"
          args: [ 'x.code' ]
          level: INFO

###############################################################################
# Variables globales pour le suivi de la découverte
###############################################################################

globals:
  # Compteur du code actuel testé
  - id: current_code
    type: uint32_t
    restore_value: no
    initial_value: '0x00000000'

  # Code de début de la plage
  - id: start_code
    type: uint32_t
    restore_value: yes
    initial_value: '0x00000000'

  # Code de fin de la plage
  - id: end_code
    type: uint32_t
    restore_value: yes
    initial_value: '0x0000FFFF'

  # Index du protocole actuel (0=NEC, 1=RC5, 2=RC6, 3=Samsung, 4=LG, 5=Sony)
  - id: protocol_index
    type: int
    restore_value: no
    initial_value: '0'

  # Nombre de codes validés
  - id: validated_count
    type: int
    restore_value: yes
    initial_value: '0'

  # Mode de découverte actif
  - id: discovery_active
    type: bool
    restore_value: no
    initial_value: 'false'

###############################################################################
# Capteurs de progression
###############################################################################

sensor:
  # Progression en %
  - platform: template
    name: "Progression"
    id: progress_sensor
    unit_of_measurement: "%"
    accuracy_decimals: 1
    update_interval: 5s
    lambda: |-
      uint32_t total = id(end_code) - id(start_code) + 1;
      uint32_t current_pos = id(current_code) - id(start_code);
      if (total == 0) return 0;
      return (float)current_pos / (float)total * 100.0;

  # Nombre de codes testés
  - platform: template
    name: "Codes Testés"
    id: tested_count_sensor
    accuracy_decimals: 0
    update_interval: 5s
    lambda: |-
      return id(current_code) - id(start_code);

  # Nombre de codes validés
  - platform: template
    name: "Codes Validés"
    id: validated_count_sensor
    accuracy_decimals: 0
    update_interval: 5s
    lambda: |-
      return id(validated_count);

  # WiFi Signal
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s

###############################################################################
# Texte de statut
###############################################################################

text_sensor:
  # Statut de la découverte
  - platform: template
    name: "Statut"
    id: discovery_status
    update_interval: 2s

  # Code actuel testé
  - platform: template
    name: "Code Actuel"
    id: current_code_display
    update_interval: 2s
    lambda: |-
      char buffer[32];
      snprintf(buffer, sizeof(buffer), "0x%08X", id(current_code));
      return {buffer};

  # Protocole actuel
  - platform: template
    name: "Protocole Actuel"
    id: protocol_display
    update_interval: 5s
    lambda: |-
      const char* protocols[] = {"NEC", "RC5", "RC6", "Samsung", "LG", "Sony"};
      int idx = id(protocol_index);
      if (idx >= 0 && idx < 6) {
        return {protocols[idx]};
      }
      return {"NEC"};

  # Informations version
  - platform: version
    name: "Version ESPHome"

###############################################################################
# Sélecteurs de configuration
###############################################################################

number:
  # Code de début
  - platform: template
    name: "Code Début"
    id: start_code_input
    min_value: 0
    max_value: 4294967295
    step: 1
    mode: box
    optimistic: true
    initial_value: 0
    on_value:
      then:
        - globals.set:
            id: start_code
            value: !lambda 'return (uint32_t)x;'
        - logger.log:
            format: "Code début défini: 0x%08X"
            args: [ '(uint32_t)x' ]
            level: INFO

  # Code de fin
  - platform: template
    name: "Code Fin"
    id: end_code_input
    min_value: 0
    max_value: 4294967295
    step: 1
    mode: box
    optimistic: true
    initial_value: 65535
    on_value:
      then:
        - globals.set:
            id: end_code
            value: !lambda 'return (uint32_t)x;'
        - logger.log:
            format: "Code fin défini: 0x%08X"
            args: [ '(uint32_t)x' ]
            level: INFO

select:
  # Sélection du protocole IR
  - platform: template
    name: "Protocole IR"
    id: protocol_selector
    optimistic: true
    options:
      - "NEC"
      - "RC5"
      - "RC6"
      - "Samsung"
      - "LG"
      - "Sony"
    initial_option: "NEC"
    on_value:
      then:
        - lambda: |-
            std::string proto = id(protocol_selector).state;
            if (proto == "NEC") id(protocol_index) = 0;
            else if (proto == "RC5") id(protocol_index) = 1;
            else if (proto == "RC6") id(protocol_index) = 2;
            else if (proto == "Samsung") id(protocol_index) = 3;
            else if (proto == "LG") id(protocol_index) = 4;
            else if (proto == "Sony") id(protocol_index) = 5;
        - logger.log:
            format: "Protocole sélectionné: %s"
            args: [ 'id(protocol_selector).state.c_str()' ]
            level: INFO

###############################################################################
# Boutons de contrôle - Interface simple
###############################################################################

button:
  # ▶️ DÉMARRER LA DÉCOUVERTE
  - platform: template
    name: "▶️ Démarrer"
    id: start_discovery
    on_press:
      then:
        - logger.log:
            format: "=========================================="
            level: INFO
        - logger.log:
            format: "🚀 DÉMARRAGE DE LA DÉCOUVERTE"
            level: INFO
        - logger.log:
            format: "Protocole: %s"
            args: [ 'id(protocol_selector).state.c_str()' ]
            level: INFO
        - logger.log:
            format: "Plage: 0x%08X à 0x%08X"
            args: [ 'id(start_code)', 'id(end_code)' ]
            level: INFO
        - logger.log:
            format: "=========================================="
            level: INFO
        - globals.set:
            id: discovery_active
            value: 'true'
        - globals.set:
            id: current_code
            value: !lambda 'return id(start_code);'
        - lambda: |-
            id(discovery_status).publish_state("En cours...");
        - script.execute: discovery_loop

  # ⏸️ PAUSE
  - platform: template
    name: "⏸️ Pause"
    id: pause_discovery
    on_press:
      then:
        - globals.set:
            id: discovery_active
            value: 'false'
        - script.stop: discovery_loop
        - lambda: |-
            id(discovery_status).publish_state("En pause");
        - logger.log:
            format: "⏸️ Découverte en pause à 0x%08X"
            args: [ 'id(current_code)' ]
            level: INFO

  # ⏹️ ARRÊTER
  - platform: template
    name: "⏹️ Arrêter"
    id: stop_discovery
    on_press:
      then:
        - globals.set:
            id: discovery_active
            value: 'false'
        - script.stop: discovery_loop
        - globals.set:
            id: current_code
            value: !lambda 'return id(start_code);'
        - lambda: |-
            id(discovery_status).publish_state("Arrêté");
        - logger.log:
            format: "⏹️ Découverte arrêtée"
            level: INFO

  # ✅ CODE VALIDE - Bouton principal pour valider qu'un code fonctionne
  - platform: template
    name: "✅ Ça Marche !"
    id: validate_code
    on_press:
      then:
        - logger.log:
            format: "=========================================="
            level: WARN
        - logger.log:
            format: "✅✅✅ CODE VALIDÉ ✅✅✅"
            level: WARN
        - logger.log:
            format: "Protocole: %s"
            args: [ 'id(protocol_selector).state.c_str()' ]
            level: WARN
        - logger.log:
            format: "Code: 0x%08X"
            args: [ 'id(current_code)' ]
            level: WARN
        - logger.log:
            format: "=========================================="
            level: WARN
        - lambda: |-
            id(validated_count)++;
        - delay: 1s

  # ⏭️ SUIVANT - Passer au code suivant sans valider
  - platform: template
    name: "⏭️ Suivant"
    id: next_code
    on_press:
      then:
        - logger.log:
            format: "⏭️ Code ignoré: 0x%08X"
            args: [ 'id(current_code)' ]
            level: DEBUG
        - lambda: |-
            if (id(discovery_active)) {
              // Incrémente et continue
              id(current_code)++;
            }

  # 🔄 RETESTER - Reteste le code actuel
  - platform: template
    name: "🔄 Retester"
    id: retest_code
    on_press:
      then:
        - logger.log:
            format: "🔄 Retest du code: 0x%08X"
            args: [ 'id(current_code)' ]
            level: INFO
        - script.execute: send_current_code

  # 🎯 TEST MANUEL - Envoie un code spécifique
  - platform: template
    name: "🎯 Test Manuel"
    id: manual_test
    on_press:
      then:
        - logger.log:
            format: "🎯 Test manuel du code: 0x%08X"
            args: [ 'id(current_code)' ]
            level: INFO
        - script.execute: send_current_code

  # 📊 RAPPORT - Affiche un résumé
  - platform: template
    name: "📊 Afficher Rapport"
    id: show_report
    on_press:
      then:
        - logger.log:
            format: "=========================================="
            level: INFO
        - logger.log:
            format: "📊 RAPPORT DE DÉCOUVERTE"
            level: INFO
        - logger.log:
            format: "Protocole: %s"
            args: [ 'id(protocol_selector).state.c_str()' ]
            level: INFO
        - logger.log:
            format: "Plage: 0x%08X à 0x%08X"
            args: [ 'id(start_code)', 'id(end_code)' ]
            level: INFO
        - logger.log:
            format: "Code actuel: 0x%08X"
            args: [ 'id(current_code)' ]
            level: INFO
        - logger.log:
            format: "Codes validés: %d"
            args: [ 'id(validated_count)' ]
            level: INFO
        - logger.log:
            format: "=========================================="
            level: INFO

  # 🔄 Restart ESP
  - platform: restart
    name: "Redémarrer ESP"

###############################################################################
# Scripts de découverte
###############################################################################

script:
  # Script principal de découverte en boucle
  - id: discovery_loop
    mode: restart
    then:
      - while:
          condition:
            lambda: |-
              return id(discovery_active) && (id(current_code) <= id(end_code));
          then:
            # Affiche le code en cours
            - lambda: |-
                char status[64];
                snprintf(status, sizeof(status), "Test: 0x%08X", id(current_code));
                id(discovery_status).publish_state(status);

            # Envoie le code IR
            - script.execute: send_current_code

            # Attend que l'utilisateur valide ou passe au suivant
            - delay: ${discovery_delay}

            # Passe au code suivant automatiquement
            - lambda: |-
                id(current_code)++;

      # Fin de la découverte
      - lambda: |-
          id(discovery_active) = false;
          id(discovery_status).publish_state("Terminé !");
      - logger.log:
          format: "🎉 Découverte terminée ! %d codes validés"
          args: [ 'id(validated_count)' ]
          level: INFO

  # Script d'envoi du code actuel
  - id: send_current_code
    mode: single
    then:
      - lambda: |-
          uint32_t code = id(current_code);
          int proto = id(protocol_index);

          ESP_LOGI("IR_SEND", "Envoi code 0x%08X (protocole: %d)", code, proto);

          // Envoie selon le protocole sélectionné
          switch(proto) {
            case 0: // NEC
              {
                uint8_t address = (code >> 16) & 0xFF;
                uint8_t command = code & 0xFF;
                auto call = id(ir_transmitter).transmit();
                esphome::remote_base::NECProtocol().encode(call.get_data(), {address, command});
                call.perform();
              }
              break;

            case 1: // RC5
              {
                uint8_t address = (code >> 8) & 0x1F;
                uint8_t command = code & 0x3F;
                auto call = id(ir_transmitter).transmit();
                esphome::remote_base::RC5Protocol().encode(call.get_data(), {address, command});
                call.perform();
              }
              break;

            case 2: // RC6
              {
                uint8_t address = (code >> 8) & 0xFF;
                uint8_t command = code & 0xFF;
                auto call = id(ir_transmitter).transmit();
                esphome::remote_base::RC6Protocol().encode(call.get_data(), {address, command});
                call.perform();
              }
              break;

            case 3: // Samsung
              {
                uint32_t samsung_code = code;
                auto call = id(ir_transmitter).transmit();
                esphome::remote_base::SamsungProtocol().encode(call.get_data(), samsung_code);
                call.perform();
              }
              break;

            case 4: // LG
              {
                uint32_t lg_code = code;
                auto call = id(ir_transmitter).transmit();
                esphome::remote_base::LGProtocol().encode(call.get_data(), {lg_code, 28});
                call.perform();
              }
              break;

            case 5: // Sony
              {
                uint16_t sony_code = code & 0xFFFF;
                auto call = id(ir_transmitter).transmit();
                esphome::remote_base::SonyProtocol().encode(call.get_data(), {sony_code, 12});
                call.perform();
              }
              break;
          }

###############################################################################
# Configuration RS-485 optionnelle (pour validation automatique future)
###############################################################################

# UART pour RS-485 - Décommentez si vous avez un adaptateur RS-485
# uart:
#   id: uart_bus
#   tx_pin: ${rs485_tx_pin}
#   rx_pin: ${rs485_rx_pin}
#   baud_rate: 9600
#   data_bits: 8
#   parity: NONE
#   stop_bits: 1
