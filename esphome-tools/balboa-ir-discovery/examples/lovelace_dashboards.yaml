###############################################################################
# Notes d'utilisation
###############################################################################

# Pour utiliser ces dashboards :
#
# 1. Allez dans Home Assistant → Aperçu
# 2. Cliquez sur les 3 points (en haut à droite) → Modifier le tableau de bord
# 3. Cliquez sur + AJOUTER UNE CARTE
# 4. Choisissez "Manuel" (YAML)
# 5. Copiez-collez un des exemples ci-dessus
# 6. Cliquez sur ENREGISTRER
#
# Personnalisation :
# - Remplacez les entity_id par vos entités réelles
# - Modifiez les couleurs, icônes, positions
# - Ajoutez vos propres éléments
#
# Pour trouver les entity_id de vos boutons :
# Outils de développement → États → Recherchez "balboa_ir_remote"
