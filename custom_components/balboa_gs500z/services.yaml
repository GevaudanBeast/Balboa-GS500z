set_temperature:
  name: Set Temperature
  description: Set the spa target temperature
  fields:
    temperature:
      name: Temperature
      description: Target temperature in Celsius
      required: true
      example: 38
      selector:
        number:
          min: 15
          max: 40
          step: 1
          unit_of_measurement: "°C"

set_mode:
  name: Set Mode
  description: Set the spa operating mode (ST/ECO/SL)
  fields:
    mode:
      name: Mode
      description: Operating mode
      required: true
      example: "eco"
      selector:
        select:
          options:
            - "standard"
            - "eco"
            - "sleep"
