name: Validate

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  validate:
    name: Validate Integration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install homeassistant
          pip install voluptuous

      - name: Validate manifest
        run: |
          python -c "
          import json
          with open('custom_components/balboa_gs500z/manifest.json') as f:
              manifest = json.load(f)

          required_keys = ['domain', 'name', 'version', 'documentation', 'codeowners', 'config_flow', 'iot_class']
          for key in required_keys:
              assert key in manifest, f'Missing required key: {key}'

          assert manifest['domain'] == 'balboa_gs500z', 'Invalid domain'
          assert manifest['config_flow'] == True, 'config_flow must be true'
          print('✅ manifest.json is valid')
          "

      - name: Check Python syntax
        run: |
          python -m py_compile custom_components/balboa_gs500z/*.py

      - name: Check file structure
        run: |
          required_files=(
            "custom_components/balboa_gs500z/__init__.py"
            "custom_components/balboa_gs500z/manifest.json"
            "custom_components/balboa_gs500z/const.py"
            "custom_components/balboa_gs500z/config_flow.py"
            "custom_components/balboa_gs500z/climate.py"
            "custom_components/balboa_gs500z/binary_sensor.py"
            "custom_components/balboa_gs500z/strings.json"
            "custom_components/balboa_gs500z/translations/en.json"
          )

          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "❌ Missing required file: $file"
              exit 1
            fi
          done
          echo "✅ All required files present"

      - name: Validate strings.json
        run: |
          python -c "
          import json
          with open('custom_components/balboa_gs500z/strings.json') as f:
              strings = json.load(f)
          print('✅ strings.json is valid JSON')
          "

      - name: Check for common issues
        run: |
          # Check for print statements (should use logger)
          if grep -r "print(" custom_components/balboa_gs500z/*.py; then
            echo "⚠️ Warning: Found print() statements. Consider using logger instead."
          fi

          # Check for TODO comments
          if grep -r "TODO" custom_components/balboa_gs500z/*.py; then
            echo "⚠️ Warning: Found TODO comments"
          fi

  hacs-validate:
    name: HACS Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration
