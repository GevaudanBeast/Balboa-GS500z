changelog:
  exclude:
    labels:
      - ignore-for-release
      - dependencies
    authors:
      - dependabot
  categories:
    - title: 🚀 New Features
      labels:
        - feature
        - enhancement
    - title: 🐛 Bug Fixes
      labels:
        - bug
        - fix
    - title: 📝 Documentation
      labels:
        - documentation
        - docs
    - title: 🔧 Improvements
      labels:
        - improvement
        - refactor
    - title: ⚙️ Configuration
      labels:
        - config
        - ci
    - title: 🧹 Maintenance
      labels:
        - chore
        - maintenance
    - title: Other Changes
      labels:
        - "*"
